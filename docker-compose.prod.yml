# Claw Empire — docker-compose.prod.yml
# Adaptado para VPS Uid Software
# Porta: 8005 (próxima disponível)
# nginx-proxy roteia: empire.uidsoftware.com.br → 8005
# Instalar em: /opt/claw-empire/

version: '3.8'

services:
  claw-empire:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-empire
    restart: always
    ports:
      - "127.0.0.1:8005:8790"   # só localhost — nginx-proxy expõe externamente
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0             # necessário dentro do container
      - PORT=8790
      - DB_PATH=/app/data/claw-empire.sqlite
      - LOGS_DIR=/app/data/logs
      - GIT_CONFIG_COUNT=5
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/home/app/projects/SytemD
      - GIT_CONFIG_KEY_1=safe.directory
      - GIT_CONFIG_VALUE_1=/var/www/studio-fluir
      - GIT_CONFIG_KEY_2=safe.directory
      - GIT_CONFIG_VALUE_2=/opt/claw-empire
      - GIT_CONFIG_KEY_3=safe.directory
      - GIT_CONFIG_VALUE_3=/opt/uid-skills
      - GIT_CONFIG_KEY_4=safe.directory
      - GIT_CONFIG_VALUE_4=/opt/uidmail
    env_file:
      - .env.prod                # credenciais fora do compose
    volumes:
      - claw_empire_data:/app/data    # persiste SQLite + logs
      - /opt/uid-skills:/app/skills:ro
      - /opt/claw-empire-config/claude-user.json:/home/app/.claude.json
      - /opt/claw-empire-config/claude-settings.json:/home/app/.claude/settings.json:ro
      # Projetos Uid montados para acesso dos agents
      - /var/www/studio-fluir:/var/www/studio-fluir
      - /root/SystemD:/home/app/projects/SytemD
      - /opt/uid-skills:/opt/uid-skills
      - /opt/uidmail:/opt/uidmail
      - /opt/claw-empire:/opt/claw-empire
      # SSH para git push ao GitHub
      - /opt/claw-empire-config/ssh/id_ed25519_github:/home/app/.ssh/id_ed25519_github:ro
      - /opt/claw-empire-config/ssh/known_hosts:/home/app/.ssh/known_hosts:ro
      - /opt/claw-empire-config/ssh/config:/home/app/.ssh/config:ro
      - /root/.claude:/home/app/.claude-host:ro # UidSkills readonly
    networks:
      - claw-empire-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8790/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  claw_empire_data:
    driver: local

networks:
  claw-empire-network:
    driver: bridge
